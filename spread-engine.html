<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sigma XIII — Spread Engine</title>
  <style>
    :root {
      --bg-primary: #07070c; --bg-card: #101019; --bg-elevated: #1c1c28; --bg-input: #0e0e18;
      --text-primary: #eae6dd; --text-secondary: #9896a8; --text-muted: #56566a;
      --gold: #c7a86c; --gold-light: #ddbf8a; --gold-dim: #7a6540;
      --green: #4a9e6a; --green-dim: rgba(74,158,106,0.15);
      --red: #b85555; --red-dim: rgba(184,85,85,0.15);
      --border: rgba(199,168,108,0.12); --border-hover: rgba(199,168,108,0.28);
      --shadow-md: 0 6px 28px rgba(0,0,0,0.45);
      --radius: 14px; --radius-sm: 8px;
      --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      --font-mono: 'SF Mono', 'Fira Code', monospace;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg-primary); color: var(--text-primary); font-family: var(--font-sans); min-height: 100vh; padding: 24px; }

    h1 { color: var(--gold); font-size: 1.6rem; margin-bottom: 8px; }
    h1 span { color: var(--text-muted); font-size: 0.85rem; font-weight: 400; }
    .subtitle { color: var(--text-secondary); margin-bottom: 32px; font-size: 0.9rem; }

    .container { max-width: 1100px; margin: 0 auto; }

    .spread-form { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; margin-bottom: 24px; }
    .form-group { display: flex; flex-direction: column; gap: 4px; }
    .form-group label { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
    .form-group input, .form-group select {
      background: var(--bg-input); border: 1px solid var(--border); color: var(--text-primary);
      padding: 10px 12px; border-radius: var(--radius-sm); font-size: 0.9rem; font-family: var(--font-mono);
      outline: none; transition: border-color 0.2s;
    }
    .form-group input:focus, .form-group select:focus { border-color: var(--gold); }

    .actions { display: flex; gap: 12px; margin-bottom: 32px; flex-wrap: wrap; }
    button {
      background: linear-gradient(135deg, var(--gold-dim), var(--gold));
      color: #07070c; border: none; padding: 10px 24px; border-radius: var(--radius-sm);
      font-weight: 600; font-size: 0.85rem; cursor: pointer; transition: opacity 0.2s;
    }
    button:hover { opacity: 0.85; }
    button.secondary { background: var(--bg-elevated); color: var(--text-primary); border: 1px solid var(--border); }
    button.danger { background: var(--red-dim); color: var(--red); border: 1px solid rgba(184,85,85,0.3); }

    .queue { margin-bottom: 32px; }
    .queue-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .queue-header h2 { font-size: 1rem; color: var(--text-secondary); }
    .queue-count { background: var(--bg-elevated); color: var(--gold); padding: 2px 10px; border-radius: 12px; font-size: 0.8rem; font-family: var(--font-mono); }

    .queue-item {
      background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-sm);
      padding: 10px 14px; margin-bottom: 6px; display: flex; justify-content: space-between; align-items: center;
      font-family: var(--font-mono); font-size: 0.82rem;
    }
    .queue-item .info { display: flex; gap: 16px; flex-wrap: wrap; }
    .queue-item .tag { color: var(--gold); }
    .queue-item .remove { color: var(--red); cursor: pointer; background: none; border: none; font-size: 1rem; padding: 0 4px; }

    .results { margin-top: 16px; }
    .results h2 { font-size: 1rem; color: var(--gold); margin-bottom: 16px; }

    .result-card {
      background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 20px; margin-bottom: 16px; box-shadow: var(--shadow-md);
    }
    .result-card .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .result-card .ticker-badge { font-size: 1.2rem; font-weight: 700; color: var(--gold-light); }
    .result-card .direction-badge {
      font-size: 0.75rem; padding: 4px 10px; border-radius: 12px; font-weight: 600; text-transform: uppercase;
    }
    .result-card .direction-badge.bear { background: var(--red-dim); color: var(--red); }
    .result-card .direction-badge.bull { background: var(--green-dim); color: var(--green); }

    .metrics { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; }
    .metric { background: var(--bg-elevated); border-radius: var(--radius-sm); padding: 12px; }
    .metric .label { font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
    .metric .value { font-family: var(--font-mono); font-size: 0.95rem; font-weight: 600; }
    .metric .value.positive { color: var(--green); }
    .metric .value.negative { color: var(--red); }
    .metric .value.gold { color: var(--gold); }

    .rank-badge {
      width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 0.8rem; background: var(--gold-dim); color: var(--gold-light);
    }

    .loading { text-align: center; padding: 40px; color: var(--text-muted); }
    .empty { text-align: center; padding: 40px; color: var(--text-muted); font-size: 0.85rem; }

    @media (max-width: 600px) {
      .spread-form { grid-template-columns: 1fr 1fr; }
      .metrics { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Spread Engine <span>v1.0</span></h1>
    <p class="subtitle">Analisi credit spread con Monte Carlo touch probability</p>

    <div class="spread-form" id="spreadForm">
      <div class="form-group">
        <label>Ticker</label>
        <input type="text" id="ticker" value="NVDA" placeholder="NVDA">
      </div>
      <div class="form-group">
        <label>Direzione</label>
        <select id="direction">
          <option value="BEAR_CALL">Bear Call</option>
          <option value="BULL_PUT">Bull Put</option>
        </select>
      </div>
      <div class="form-group">
        <label>Prezzo Corrente</label>
        <input type="number" id="currentPrice" step="0.01" value="194.20">
      </div>
      <div class="form-group">
        <label>Short Strike</label>
        <input type="number" id="shortStrike" step="0.5" value="220">
      </div>
      <div class="form-group">
        <label>Long Strike</label>
        <input type="number" id="longStrike" step="0.5" value="225">
      </div>
      <div class="form-group">
        <label>Short Price</label>
        <input type="number" id="shortPrice" step="0.01" value="1.20">
      </div>
      <div class="form-group">
        <label>Long Price</label>
        <input type="number" id="longPrice" step="0.01" value="0.65">
      </div>
      <div class="form-group">
        <label>IV (decimale)</label>
        <input type="number" id="iv" step="0.001" value="0.419">
      </div>
      <div class="form-group">
        <label>Giorni a Scadenza</label>
        <input type="number" id="daysToExpiration" value="56">
      </div>
      <div class="form-group">
        <label>Contratti</label>
        <input type="number" id="contracts" value="3" min="1">
      </div>
    </div>

    <div class="actions">
      <button onclick="addToQueue()">+ Aggiungi alla Coda</button>
      <button class="secondary" onclick="analyzeAll()">Analizza e Classifica</button>
      <button class="danger" onclick="clearQueue()">Svuota Coda</button>
    </div>

    <div class="queue">
      <div class="queue-header">
        <h2>Coda Spread</h2>
        <span class="queue-count" id="queueCount">0</span>
      </div>
      <div id="queueList">
        <div class="empty">Nessuno spread in coda. Compila il form e aggiungi.</div>
      </div>
    </div>

    <div class="results" id="results"></div>
  </div>

<script>
const queue = [];

function getFormData() {
  return {
    ticker: document.getElementById('ticker').value.toUpperCase(),
    direction: document.getElementById('direction').value,
    currentPrice: parseFloat(document.getElementById('currentPrice').value),
    shortStrike: parseFloat(document.getElementById('shortStrike').value),
    longStrike: parseFloat(document.getElementById('longStrike').value),
    shortPrice: parseFloat(document.getElementById('shortPrice').value),
    longPrice: parseFloat(document.getElementById('longPrice').value),
    iv: parseFloat(document.getElementById('iv').value),
    daysToExpiration: parseInt(document.getElementById('daysToExpiration').value),
    contracts: parseInt(document.getElementById('contracts').value)
  };
}

function addToQueue() {
  const data = getFormData();
  if (!data.ticker || isNaN(data.currentPrice)) return;
  queue.push(data);
  renderQueue();
}

function removeFromQueue(i) {
  queue.splice(i, 1);
  renderQueue();
}

function clearQueue() {
  queue.length = 0;
  renderQueue();
  document.getElementById('results').innerHTML = '';
}

function renderQueue() {
  document.getElementById('queueCount').textContent = queue.length;
  const el = document.getElementById('queueList');
  if (!queue.length) { el.innerHTML = '<div class="empty">Nessuno spread in coda. Compila il form e aggiungi.</div>'; return; }
  el.innerHTML = queue.map((s, i) => `
    <div class="queue-item">
      <div class="info">
        <span class="tag">${s.ticker}</span>
        <span>${s.direction === 'BEAR_CALL' ? 'Bear Call' : 'Bull Put'}</span>
        <span>${s.shortStrike}/${s.longStrike}</span>
        <span>$${s.currentPrice}</span>
        <span>${s.daysToExpiration}g</span>
        <span>${s.contracts} ctr</span>
      </div>
      <button class="remove" onclick="removeFromQueue(${i})">&times;</button>
    </div>
  `).join('');
}

async function analyzeAll() {
  if (!queue.length) return;
  const resultsEl = document.getElementById('results');
  resultsEl.innerHTML = '<div class="loading">Simulazione Monte Carlo in corso...</div>';

  try {
    const res = await fetch('/spread/rank', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ spreads: queue })
    });
    const ranked = await res.json();
    if (ranked.error) { resultsEl.innerHTML = `<div class="empty">Errore: ${ranked.error}</div>`; return; }
    renderResults(ranked);
  } catch (e) {
    resultsEl.innerHTML = `<div class="empty">Errore di connessione: ${e.message}</div>`;
  }
}

function renderResults(ranked) {
  const el = document.getElementById('results');
  el.innerHTML = '<h2>Classifica Spread</h2>' + ranked.map((r, i) => `
    <div class="result-card">
      <div class="card-header">
        <div style="display:flex;align-items:center;gap:12px">
          <div class="rank-badge">${i + 1}</div>
          <span class="ticker-badge">${r.ticker}</span>
          <span>${r.spread}</span>
        </div>
        <span class="direction-badge ${r.direction === 'BEAR_CALL' ? 'bear' : 'bull'}">
          ${r.direction === 'BEAR_CALL' ? 'Bear Call' : 'Bull Put'}
        </span>
      </div>
      <div class="metrics">
        <div class="metric"><div class="label">Credito</div><div class="value gold">$${r.credit}</div></div>
        <div class="metric"><div class="label">Max Profit</div><div class="value positive">$${r.maxProfit}</div></div>
        <div class="metric"><div class="label">Max Loss</div><div class="value negative">$${r.maxLoss}</div></div>
        <div class="metric"><div class="label">Break Even</div><div class="value">$${r.breakEven}</div></div>
        <div class="metric"><div class="label">Distanza BE</div><div class="value">${r.distance > 0 ? '+' : ''}${r.distance} (${r.distancePct})</div></div>
        <div class="metric"><div class="label">P(Touch BE)</div><div class="value negative">${r.touchProbability}</div></div>
        <div class="metric"><div class="label">P(No Touch)</div><div class="value positive">${r.noTouchProbability}</div></div>
        <div class="metric"><div class="label">Mediana Touch</div><div class="value">${r.medianFirstTouchDays}</div></div>
      </div>
    </div>
  `).join('');
}
</script>
</body>
</html>
